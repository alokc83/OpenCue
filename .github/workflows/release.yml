name: Release macOS App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      app_version:
        description: 'App version to build (e.g. 1.1.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-notarize:
    runs-on: macos-14
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set App Version
      id: set-version
      run: |
        if [[ "${{ github.event_name }}" == "release" ]]; then
          # Extract version from the release tag, stripping the 'v' prefix if it exists
          VERSION=${GITHUB_REF_NAME#v}
        else
          VERSION="${{ github.event.inputs.app_version }}"
        fi
        echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Install dependencies
      run: |
        brew install xcodegen

    - name: Install the Apple Certificate
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # Import certificate and provisioning profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

        # Create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # Import certificate to keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        
        # Set keychain to default
        security default-keychain -s $KEYCHAIN_PATH
        security list-keychains -d user -s $KEYCHAIN_PATH

    - name: Build, Sign, Package, and Notarize
      env:
        DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        TEAM_ID: ${{ secrets.TEAM_ID }}
        APP_VERSION: ${{ env.APP_VERSION }}
      run: |
        chmod +x ./Scripts/package.sh
        ./Scripts/package.sh

    - name: Upload DMG to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: OpenCue-${{ env.APP_VERSION }}.dmg
