name: OpenCue
options:
  bundleIdPrefix: com.opencue
  deploymentTarget:
    macOS: "14.0"
targets:
  OpenCue:
    type: application
    platform: macOS
    sources:
      - path: OpenCue
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-" # Ad-hoc sign for local build
        GENERATE_INFOPLIST_FILE: YES
