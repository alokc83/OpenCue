name: OpenCue
options:
  bundleIdPrefix: com.opencue
  deploymentTarget:
    macOS: "14.0"
targets:
  OpenCue:
    type: application
    platform: macOS
    sources:
      - path: OpenCue
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_VERSION: 5.0
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 55A5VSLH99
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 4
        INFOPLIST_KEY_NSHumanReadableCopyright: 'Copyright © 2026 Mt. Aden LLC. All rights reserved.'
        GENERATE_INFOPLIST_FILE: YES
  OpenCueTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OpenCueTests
    dependencies:
      - target: OpenCue
    settings:
      base:
        SWIFT_VERSION: 5.0
        GENERATE_INFOPLIST_FILE: YES
